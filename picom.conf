shadow = false;

fading = false;

inactive-opacity = 1;
frame-opacity = 1;
popup_menu = 1;
dropdown_menu = 1;
inactive-opacity-override = false;
active-opacity = 1.0;
focus-exclude = [ "class_g = 'Cairo-clock'" ];

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

backend = "glx";
glx-no-stencil = true;
vsync = true;
refresh-rate = 0;
resize-damage = 1;
use-damage = false;

wintypes:
{
  tooltip = { fade = false; shadow = false; opacity = 1; focus = true; full-shadow = false; };
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1; }
  dropdown_menu = { opacity = 1; }
};
