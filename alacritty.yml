window:
  dimensions:
    columns: 80
    lines: 40

  padding:
    x: 7
    y: 2

font:
  normal:
    family: Hack
    style: Regular

  bold:
    family: Hack
    style: Bold

  italic:
    family: Hack
    style: Italic

  bold_italic:
    family: Hack
    style: Bold Italic

  size: 9

colors:
  primary:
    background: '#000000'
    foreground: '#ffffff'

  normal:
    black: '#000000'
    red: '#cd0000'
    green: '#00cd00'
    yellow: '#cdcd00'
    blue: '#0000ee'
    magenta: '#cd00cd'
    cyan: '#00cdcd'
    white: '#e5e5e5'

  bright:
    black: '#7f7f7f'
    red: '#ff0000'
    green: '#00ff00'
    yellow: '#ffff00'
    blue: '#5c5cff'
    magenta: '#ff00ff'
    cyan: '#00ffff'
    white: '#ffffff'

key_bindings:
  - {key: V, mods: Alt, action: Paste}
