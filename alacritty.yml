window:
  dimensions:
    columns: 80
    lines: 40

  padding:
    x: 12
    y: 6

font:
  normal:
    family: Hack
    style: Regular

  bold:
    family: Hack
    style: Bold

  italic:
    family: Hack
    style: Italic

  bold_italic:
    family: Hack
    style: Bold Italic

  size: 9

colors:
  cursor:
    foreground: '#000000'
    background: '#dadada'

key_bindings:
  - {key: V, mods: Alt, action: Paste}
