window:
  dimensions:
    columns: 80
    lines: 40

  padding:
    x: 7
    y: 2

font:
  normal:
    family: Hack
    style: Regular

  bold:
    family: Hack
    style: Bold

  italic:
    family: Hack
    style: Italic

  bold_italic:
    family: Hack
    style: Bold Italic

  size: 9

colors:
  primary:
    background: '#000000'
    foreground: '#dadada'

  normal:
    black: '#303030'
    red: '#d70000'
    green: '#5fd75f'
    yellow: '#afaf00'
    blue: '#87afff'
    magenta: '#af00af'
    cyan: '#00afaf'
    white: '#6c6c6c'

  bright:
    black: '#444444'
    red: '#ff0000'
    green: '#00ff00'
    yellow: '#ffff00'
    blue: '#005fff'
    magenta: '#ff00ff'
    cyan: '#00ffff'
    white: '#ffffff'

key_bindings:
  - {key: V, mods: Alt, action: Paste}
