window:
  dimensions:
    columns: 80
    lines: 40

  padding:
    x: 7
    y: 2

font:
  normal:
    family: Hack
    style: Regular

  bold:
    family: Hack
    style: Bold

  italic:
    family: Hack
    style: Italic

  bold_italic:
    family: Hack
    style: Bold Italic

  size: 9

colors:
  primary:
    foreground: '#dadada'
    background: '#0f0f0f'

  cursor:
    foreground: '#0f0f0f'
    background: '#dadada'

key_bindings:
  - {key: V, mods: Alt, action: Paste}
