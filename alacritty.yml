window:
  decorations: none
  padding:
    x: 7
    y: 2

font:
  normal:
    family: Dejavu Sans Mono
  bold:
    family: Dejavu Sans Mono
  italic:
    family: Dejavu Sans Mono
  size: 12

custom_cursor_colors: true
colors:
  primary:
    background: '#14161b'

  cursor:
    text: '#e4e4e4'
    cursor: '#aa0000'

key_bindings:
  - {key: V, mods: Alt, action: Paste}
