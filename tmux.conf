# without it escape in vim works after one second
set -sg escape-time 0

# change C-b to C-x
unbind C-b
set-option -g prefix C-z
bind-key C-z send-prefix

# emacs keybindings
set-option -g status-keys emacs

# splits with save current path
bind-key '"' split-window -h -c "#{pane_current_path}"
bind-key % split-window -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# no confirmation on kill single pane
bind-key x kill-pane

# copy/paste to system clipboard
bind-key -T copy-mode-vi Enter send -X copy-pipe-no-clear "xclip -sel clipboard" \; send-keys -X cancel
bind-key ] run "tmux set-buffer \"$(xclip -o -sel clipboard)\" && tmux paste-buffer"

# store lines
set-option -g history-limit 120015
