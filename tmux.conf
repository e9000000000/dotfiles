set-window-option -g mode-keys vi

# without it escape in vim works after one second
set -sg escape-time 0

# change C-b to C-x
unbind C-b
set-option -g prefix C-x
bind-key C-x send-prefix

# splits with save current path
bind-key '"' split-window -h -c "#{pane_current_path}"
bind-key % split-window -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# no confirmation on kill single pane
bind-key x kill-pane

# copy/paste to system clipboard
bind-key -T copy-mode-vi Enter send -X copy-pipe-no-clear "xclip -sel clipboard" \; send-keys -X cancel
bind-key ] run "tmux set-buffer \"$(xclip -o -sel clipboard)\" && tmux paste-buffer"

# store lines
set-option -g history-limit 120015

# status line
set-option -g status-style fg=default,bg=default
set-option -g status-right ""
set-option -g status-left ""

# start window index - 1, so i can press C-x 1 and navigate to first window instead of second
set -g base-index 1
setw -g pane-base-index 1
