window:
  opacity: 0.9
  dimensions:
    columns: 140
    lines: 40

  padding:
    x: 2
    y: 2
  dynamic_padding: false

  decorations: full
  startup_mode: Windowed
  title: Alacritty
  dynamic_title: true

  class:
    instance: Alacritty
    general: Alacritty
  gtk_theme_variant: None

scrolling:
  history: 4000
  multiplier: 4

font:
  normal:
    family: DejaVu Sans Mono
  bold:
    family: DejaVu Sans Mono
  italic:
    family: DejaVu Sans Mono
  bold_italic:
    family: DejaVu Sans Mono

  size: 11.0

  offset:
    x: 0
    y: 0

  glyph_offset:
    x: 0
    y: 0

draw_bold_text_with_bright_colors: false

colors:
  primary:
    background: '#000000'
    foreground: '#fefefe'

  cursor:
    text: '#000000'
    cursor: '#fefefe'

