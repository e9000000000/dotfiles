window:
  opacity: 1
  dimensions:
    columns: 140
    lines: 40

  padding:
    x: 2
    y: 2
  dynamic_padding: false

  decorations: full
  startup_mode: Windowed
  title: Alacritty
  dynamic_title: true

  class:
    instance: Alacritty
    general: Alacritty
  gtk_theme_variant: None

scrolling:
  history: 4000
  multiplier: 4

font:
  normal:
    family: DejaVu Sans Mono
  bold:
    family: DejaVu Sans Mono
  italic:
    family: DejaVu Sans Mono
  bold_italic:
    family: DejaVu Sans Mono

  size: 11.0

  offset:
    x: 0
    y: 0

  glyph_offset:
    x: 0
    y: 0

draw_bold_text_with_bright_colors: false

colors:
  primary:
    background:        &bg "#282828"
    foreground:        &fg "#ebdbb2"
    bright_foreground: "#fbf1c7"
    dim_foreground:    "#a89984"
  cursor:
    text:    *bg
    cursor:  *fg
  normal:
    black:   *bg
    red:     "#cc241d"
    green:   "#98971a"
    yellow:  "#d79921"
    blue:    "#458588"
    magenta: "#b16286"
    cyan:    "#689d6a"
    white:   "#a89984"
  bright:
    black:   "#928374"
    red:     "#fb4934"
    green:   "#b8bb26"
    yellow:  "#fabd2f"
    blue:    "#83a598"
    magenta: "#d3869b"
    cyan:    "#8ec07c"
    white:   "#ebdbb2"
  dim:
    black:   "#32302f"
    red:     "#9d0006"
    green:   "#79740e"
    yellow:  "#b57614"
    blue:    "#076678"
    magenta: "#8f3f71"
    cyan:    "#427b58"
    white:   "#928374"


selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: false

cursor:
  style:
    shape: Block
    blinking: Never

  unfocused_hollow: true
  thickness: 0.15

live_config_reload: true
