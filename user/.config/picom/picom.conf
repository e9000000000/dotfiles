shadow = false;

fading = true
fade-in-step = 0.07;
fade-out-step = 0.07;
fade-delta = 7

inactive-opacity = 1;
frame-opacity = 1;
popup_menu = 1
dropdown_menu = 1
inactive-opacity-override = false;
active-opacity = 1.0
focus-exclude = [ "class_g = 'Cairo-clock'" ];

#blur-method = "gaussian"
#blur-size = 5
#blur-deviation = 2.5
#blur-kern = "3x3box";
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#backend = "xr_glx_hybrid";
backend = "glx";
#backend = "xrender";
glx-no-stencil = true;
vsync = false;
refresh-rate = 0;
resize-damage = 1;
use-damage = true

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 1; focus = true; full-shadow = false; };
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1; }
  dropdown_menu = { opacity = 1; }
};
