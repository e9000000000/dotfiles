# settings_____________________________________________________________________

# `tmux attach` with no sessions starts new session
new-session -n $HOST

# without it escape in vim working after one second
set -sg escape-time 10


# design_______________________________________________________________________

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

#  modes
setw -g clock-mode-colour colour5
setw -g mode-style 'fg=black bg=yellow bold'

# panes
set -g pane-border-style 'fg=black bg=default'
set -g pane-active-border-style 'fg=yellow bg=default'

# statusbar
set -g status-position top
set -g status-justify left
set -g status-style 'fg=yellow bg=black'
set -g status-left ''
set -g status-right ''
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style 'fg=black bg=yellow'
setw -g window-status-current-format ')('

setw -g window-status-style 'fg=yellow bg=black'
setw -g window-status-format '__'

setw -g window-status-bell-style 'fg=yellow bg=black'

# messages
set -g message-style 'fg=black bg=yellow'


# keybinds_____________________________________________________________________

# change C-b to C-z
unbind C-b
set-option -g prefix C-z
bind-key C-z send-prefix

# kill pane
bind -n M-q kill-pane

# horizontal split
unbind l
unbind C-l
bind-key l split-window -h -c "#{pane_current_path}"
bind-key C-l split-window -h -c "#{pane_current_path}"

# veritcal split
unbind j
unbind C-j
bind-key j split-window -c "#{pane_current_path}"
bind-key C-j split-window -c "#{pane_current_path}"

# switch pane
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# switch window
bind -n M-o next-window
bind -n M-i previous-window

bind -n M-1 select-window -t 0
bind -n M-2 select-window -t 1
bind -n M-3 select-window -t 2
bind -n M-4 select-window -t 3
bind -n M-5 select-window -t 4
bind -n M-6 select-window -t 5
bind -n M-7 select-window -t 6
bind -n M-8 select-window -t 7
bind -n M-9 select-window -t 8

# new window
bind -n M-n new-window -c "#{pane_current_path}"
